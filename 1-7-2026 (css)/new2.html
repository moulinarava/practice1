<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        .container{
            display:grid;
            grid-template-columns:220px 1fr;
            grid-template-rows:80px auto 70px;
            gap:10px;
            min-height:100vh;
        }

        header{
            grid-column:1/3;
            background:#3498db;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:28px;
        }

        aside{
            background:#dcdde1;
            padding:20px;
        }

        aside ul{
            list-style:none;
        }

        aside li{
            margin:15px 0;
        }

        main{
            background:#f5f6fa;
            padding:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(3,1fr);
            grid-template-rows:150px 150px;
            gap:15px;
            justify-items:center;
            align-items:center;
            margin-top:20px;
        }

        .card{
            background:orange;
            width:150px;
            height:100px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:20px;
            color:white;
        }

        .card1{
            grid-column:1/3;
            width:100%;
        }

        .card4{
            grid-row:2/4;
            height:100%;
        }

        .place{
            display:grid;
            place-items:center;
            background:lightgreen;
            height:120px;
            margin-top:20px;
            font-size:22px;
        }

        footer{
            grid-column:1/3;
            background:#2f3640;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        @media(max-width:768px){

            .container{
                grid-template-columns:1fr;
                grid-template-rows:auto;
            }

            header,
            footer{
                grid-column:auto;
            }

            .cards{
                grid-template-columns:1fr;
            }

            .card1{
                grid-column:auto;
                width:150px;
            }

            .card4{
                grid-row:auto;
                height:100px;
            }

        }

    </style>

</head>

<body>

<div class="container">

<header>
Dashboard Header
</header>

<aside>

<h2>Menu</h2>

<ul>
<li>Home</li>
<li>Profile</li>
<li>Reports</li>
<li>Settings</li>
</ul>

</aside>

<main>

<h2>Dashboard Cards</h2>

<div class="cards">

<div class="card card1">Card 1</div>

<div class="card">Card 2</div>

<div class="card">Card 3</div>

<div class="card card4">Card 4</div>

<div class="card">Card 5</div>

<div class="card">Card 6</div>

</div>

<div class="place">
place-items:center
</div>

</main>

<footer>
  
</footer>

</div>

</body>
</html>
