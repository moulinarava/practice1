<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Layout Practice</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Header */
header{
    background:#3498db;
    color:white;
    text-align:center;
    padding:20px;
    font-size:25px;
}

/* Navigation using Flexbox */
nav{
    background:#2c3e50;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:10px;
}

nav a:hover{
    background:white;
    color:black;
    border-radius:5px;
}

/* Dashboard Layout using CSS Grid */
.container{
    display:grid;
    grid-template-columns:200px 1fr;
    grid-template-rows:auto;
    gap:15px;
    padding:15px;
}

/* Sidebar */
aside{
    background:#dfe6e9;
    padding:20px;
}

/* Main */
main{
    background:#ecf0f1;
    padding:20px;
}

/* Grid Container */
.grid-container{
    display:grid;

    /* grid-template-columns */
    grid-template-columns:repeat(3,1fr);

    /* grid-template-rows */
    grid-template-rows:120px 120px 120px;

    gap:15px;

    justify-items:center;

    align-items:center;

    margin-top:20px;
    border:2px solid black;
    padding:15px;
}

.grid-item{
    width:100px;
    height:80px;
    background:orange;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    color:white;
}

/* grid-column */
.item1{
    grid-column:1/3;
    width:100%;
}

/* grid-row */
.item4{
    grid-row:2/4;
    height:100%;
}

/* place-items Example */
.place{
    display:grid;
    place-items:center;
    height:150px;
    background:lightgreen;
    margin-top:30px;
    font-size:25px;
}

/* Cards using Flexbox */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
    justify-content:center;
}

.card{
    width:200px;
    height:150px;
    background:#9b59b6;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* Footer */
footer{
    background:#34495e;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:20px;
}

/* Responsive */
@media(max-width:768px){

.container{
    grid-template-columns:1fr;
}

.grid-container{
    grid-template-columns:1fr;
}

.item1{
    grid-column:auto;
}

.item4{
    grid-row:auto;
    height:80px;
    width:100px;
}

}

</style>

</head>
<body>

<header>
CSS Layout Practice
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>

<div class="container">

<aside>

<h2>Sidebar</h2>

<ul>
<li>Dashboard</li>
<li>Profile</li>
<li>Settings</li>
<li>Reports</li>
</ul>

</aside>

<main>

<h2>Main Content</h2>

<p>This page demonstrates Flexbox and CSS Grid properties.</p>

<h2 style="margin-top:20px;">CSS Grid Example</h2>

<div class="grid-container">

<div class="grid-item item1">1</div>

<div class="grid-item">2</div>

<div class="grid-item">3</div>

<div class="grid-item item4">4</div>

<div class="grid-item">5</div>

<div class="grid-item">6</div>

<div class="grid-item">7</div>

</div>

<div class="place">
place-items:center
</div>

<h2 style="margin-top:30px;">Cards using Flexbox</h2>

<div class="cards">

<div class="card">Card 1</div>

<div class="card">Card 2</div>

<div class="card">Card 3</div>

<div class="card">Card 4</div>

</div>

</main>

</div>

<footer>

Footer Section

</footer>

</body>
</html>
