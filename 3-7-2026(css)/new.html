<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete CSS Revision</title>
    <link rel="stylesheet" href="new.css">
</head>
<body>

    <header>
        <h1>CSS Complete Revision</h1>
    </header>

    <!-- Specificity Example -->
    <section>
        <h2>1. CSS Specificity</h2>

        <p>This is Normal Paragraph</p>

        <p class="blue">Class Selector</p>

        <p id="red">ID Selector</p>

        <p class="blue" id="green" style="color:orange;">
            Inline Style Example
        </p>

        <p class="important">
            !important Example
        </p>

    </section>

    <!-- Box Model -->
    <section>

        <h2>2. Box Model</h2>

        <div class="box">
            CSS Box Model
        </div>

    </section>

    <!-- Flexbox -->
    <section>

        <h2>3. Flexbox Layout</h2>

        <div class="flex">

            <div>Home</div>

            <div>About</div>

            <div>Services</div>

            <div>Contact</div>

        </div>

    </section>

    <!-- Grid -->
    <section>

        <h2>4. CSS Grid</h2>

        <div class="grid">

            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>

        </div>

    </section>

    <!-- Combined Layout -->
    <section>

        <h2>5. Flexbox + Grid</h2>

        <div class="container">

            <aside>
                Sidebar
            </aside>

            <main>

                <div class="cards">

                    <div>Card 1</div>
                    <div>Card 2</div>
                    <div>Card 3</div>
                    <div>Card 4</div>

                </div>

            </main>

        </div>

    </section>

</body>
</html>
