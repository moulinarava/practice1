<!DOCTYPE html>
<html>
<head>
    <title>Output Methods</title>
</head>
<body>
    <h2 id="heading"></h2>

    <script>
        // Console Output
        console.log("This is console output");

        // Alert Output
        alert("This is alert output");

        // Document Write
        document.write("<p>This is document.write output</p>");

        // InnerHTML
        document.getElementById("heading").innerHTML =
            "This is innerHTML output";
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>BOM Example</title>
</head>
<body>

    <button onclick="showInfo()">Show Browser Info</button>

    <script>
        function showInfo() {
            console.log("Window Width:", window.innerWidth);

            console.log("Browser Name:",
                navigator.appName);

            console.log("Current URL:",
                location.href);

            console.log("History Length:",
                history.length);
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Fetch API Example</title>
</head>
<body>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
    .then(response => response.json())
    .then(data => {
        console.log(data);
    })
    .catch(error => {
        console.log("Error:", error);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Display API Data</title>
</head>
<body>

<h2>User List</h2>
<ul id="userList"></ul>

<script>
fetch("https://jsonplaceholder.typicode.com/users")
    .then(response => response.json())
    .then(users => {
        let output = "";

        users.forEach(user => {
            output += `<li>${user.name}</li>`;
        });

        document.getElementById("userList").innerHTML = output;
    })
    .catch(error => {
        console.log(error);
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>API Error Handling</title>
</head>
<body>

<script>
async function getUsers() {
    try {
        const response = await fetch(
            "https://jsonplaceholder.typicode.com/users"
        );

        if (!response.ok) {
            throw new Error("Failed to fetch data");
        }

        const data = await response.json();

        console.log("Success:", data);
    }
    catch (error) {
        console.log("Error:", error.message);
    }
    finally {
        console.log("Request Completed");
    }
}

getUsers();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
</head>
<body>

<input type="text" id="city" placeholder="Enter City">
<button onclick="getWeather()">Get Weather</button>

<h3 id="result"></h3>

<script>
async function getWeather() {
    const city = document.getElementById("city").value;

    try {
        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=YOUR_API_KEY`
        );

        if (!response.ok) {
            throw new Error("City not found");
        }

        const data = await response.json();

        document.getElementById("result").innerHTML =
            `City: ${data.name}<br>
             Temperature: ${(data.main.temp - 273.15).toFixed(2)} °C`;
    }
    catch(error) {
        document.getElementById("result").innerHTML =
            error.message;
    }
}
</script>

</body>
</html>
