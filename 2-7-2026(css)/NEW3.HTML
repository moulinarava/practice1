<!DOCTYPE html>
<html>
<head>
<title>Responsive Webpage</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

header{
    background:blue;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:black;
    display:flex;
    justify-content:center;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

.container{
    display:flex;
    padding:20px;
    gap:20px;
}

.content{
    flex:2;
}

.sidebar{
    flex:1;
    background:lightgray;
    padding:20px;
}

img{
    width:100%;
    height:250px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

/* Tablet */

@media(max-width:768px){

.container{
    flex-direction:column;
}

}

/* Mobile */

@media(max-width:600px){

header{
    font-size:20px;
}

nav{
    flex-direction:column;
    align-items:center;
}

nav a{
    width:100%;
    text-align:center;
    border-bottom:1px solid white;
}

img{
    height:180px;
}

.container{
    padding:10px;
}

}

</style>

</head>

<body>

<header>
<h1>My Responsive Website</h1>
</header>

<nav>

<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>

</nav>

<div class="container">

<div class="content">

<h2>Welcome</h2>

<p>
This is a simple responsive webpage created using Flexbox and Media Queries.
Resize the browser window to see how the layout changes.
</p>

<br>

<img src="https://picsum.photos/800/300" alt="Sample Image">

</div>

<div class="sidebar">

<h3>Sidebar</h3>

<p>Latest News</p>

<p>Gallery</p>

<p>Contact Info</p>

</div>

</div>

<footer>

THANKEYOU

</footer>

</body>
</html>
